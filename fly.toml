app = "renewal-voice-agent"  # change to a globally-unique name before first deploy
primary_region = "sin"       # pick the Fly.io region closest to you

[build]
  dockerfile = "Dockerfile.agent"

# No [http_service] / [[services]] block on purpose — this is a worker that
# holds an outbound connection to LiveKit Cloud, it doesn't listen on a port.

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
